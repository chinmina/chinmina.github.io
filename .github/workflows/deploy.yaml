name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  deployments: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install D2 diagramming tool
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Build site
        run: pnpm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  deploy-cloudflare:
    needs: build
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
      url: ${{ steps.cf-url.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: .wrangler-output
          CF_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: pnpm wrangler pages deploy --branch="$CF_BRANCH"

      - name: Extract deployment URL
        id: cf-url
        if: always() && steps.deploy.outcome == 'success'
        run: |
          url=$(cat .wrangler-output/wrangler-output-*.json 2>/dev/null \
            | jq -r 'select(.type == "pages-deploy-detailed") | .url // empty' \
            | head -1)
          echo "value=${url}" >> "$GITHUB_OUTPUT"
          echo "### Cloudflare Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${url}" >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: .wrangler-output
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/cloudflare-deploy.sh comment

